<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' https://api.selection.rs https://admin.selection.rs; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">

    <title>Selection Master Control Plane</title>
    <link rel="stylesheet" href="style.css?v=19.0.0">
</head>

<body id="selection-admin-root" data-status="loading">

    <header class="master-navigation-bar">
        <div class="brand-zone">
            <span class="logo-gold">Selection</span>
            <span class="logo-sub">Shell Core</span>
        </div>

        <form id="provision-form" class="inline-provision-form">
            <input type="email" id="client-email" class="shell-input" placeholder="Email klijenta (npr. ime@gmail.com)"
                required>
            <div class="inline-input-addon">
                <input type="text" id="client-subdomain" class="shell-input" placeholder="poddomen" required>
                <span class="addon-tag">.selection.rs</span>
            </div>
            <button type="submit" class="btn btn-gold">Lansiraj Klijenta</button>
        </form>

        <div id="admin-identity" class="user-badge-gold">Verifikacija...</div>
    </header>

    <main class="dashboard-workspace">
        <section class="control-table-card">
            <div class="table-title-area">
                <h2>Sistemski Žurnal Korisnika</h2>
                <p class="subtitle">Pregled aktivnih viza, dodeljenih resursa i Temporal Guard pečata na ivici mreže</p>
            </div>

            <div class="table-responsive">
                <table class="master-table">
                    <thead>
                        <tr>
                            <th>Korisnik</th>
                            <th>Tenant (Poddomen)</th>
                            <th>Uloga</th>
                            <th>Status Vize</th>
                            <th>Verzija Zapisa</th>
                            <th style="text-align: right;">Akcije</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <tr>
                            <td colspan="6" class="text-center" style="padding: 40px; color: var(--gold);">
                                ⚡ Inicijalizujem skeniranje Edge KV magistrale...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="control-plane.js?v=19.0.0"></script>
</body>

</html>
